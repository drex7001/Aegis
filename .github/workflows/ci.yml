name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install aegis package
        run: pip install -e ".[dev]"
      - name: Unit tests
        run: python -m pytest -q
      - name: Validate ontology artifact (Article XI gate)
        run: aegis ontology validate
